            			throw 'Unexpected HTTP response code: ' + this.request.getStatus();
            		}
            	};
            }
            
            // Parse parameters from the value passed by Zabbix
            var params = JSON.parse(value);
            
            // Validate required parameters: endpoint URL, username, password, and expected HTTP status code
            validateZabbixParams(['url', 'user', 'password', 'http_status_code'], params);
            
            // Create an XFUSION HardDisk query object
            var hardDiskApi = new XFUSION('HardDisk', 'Get hard disk raw data', params);
            
            // Request the drive collection resource to get the list of all drive members
            var hardDiskCollection = JSON.parse(
            	hardDiskApi.executeRequest('/redfish/v1/Chassis/1/Drives')
            );
            
            // Validate that the Members field exists and is an array
            if (!hardDiskCollection.Members || !Array.isArray(hardDiskCollection.Members)) {
            	throw 'HardDisk Members is missing or invalid.';
            }
            
            // Used to store detailed information for each drive
            var hardDiskDetails = [];
            
            // Iterate through each drive member
            for (var i = 0; i < hardDiskCollection.Members.length; i++) {
            	var hardDiskMember = hardDiskCollection.Members[i];
            
            	// Skip the current member if @odata.id is missing
            	if (!hardDiskMember['@odata.id']) {
            		continue;
            	}
            
            	// Get the resource path of the current drive member
            	var hardDiskOdataId = hardDiskMember['@odata.id'];
            
            	// Retrieve the complete raw data for the individual drive from its detail endpoint
            	var hardDiskRaw = JSON.parse(hardDiskApi.executeRequest(hardDiskOdataId));
            
            	// Convert drive capacity from bytes to GB and keep 2 decimal places
            	var hardDiskCapacityInGB = hardDiskRaw.CapacityBytes != null
            		? (hardDiskRaw.CapacityBytes / 1073741824).toFixed(2)
            		: null;
            
            	// Extract required drive fields and build a simplified drive object
            	var hardDiskInfo = {
            		Name: hardDiskRaw.Name,
            		CapacityInGB: hardDiskCapacityInGB,
            		Manufacturer: hardDiskRaw.Manufacturer,
            		Model: hardDiskRaw.Model,
            		SerialNumber: hardDiskRaw.SerialNumber,
