            		Temperature: hardDiskRaw.Oem && hardDiskRaw.Oem.xFusion ? hardDiskRaw.Oem.xFusion.Temperature : null,
            		Revision: hardDiskRaw.Revision,
            		LifeUsed: hardDiskRaw.Oem && hardDiskRaw.Oem.xFusion ? hardDiskRaw.Oem.xFusion.LifeUsed : null,
            		DeviceLocator: hardDiskRaw.Oem && hardDiskRaw.Oem.xFusion ? hardDiskRaw.Oem.xFusion.SlotNumber : null,
            		Protocol: hardDiskRaw.Protocol
            	};
            
            	// Add the retrieved drive details to the result array
            	hardDiskDetails.push(hardDiskInfo);
            }
            
            // Convert all drive details to a JSON string and return it to Zabbix
            return JSON.stringify(hardDiskDetails);
