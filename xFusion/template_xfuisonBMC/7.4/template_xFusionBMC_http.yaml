        - uuid: fa9493252e25480694957b426039a38c
          name: 'Get Thermal Raw'
          type: SCRIPT
          key: xfusion.server.chassis.getThermalRaw
          delay: 600s
          history: 7d
          value_type: TEXT
          params: |
            // Validate whether required fields are present in the input parameters
            function validateZabbixParams(requiredParams, allParams) {
            	requiredParams.forEach(function (field) {
            		if (typeof allParams !== 'object' || typeof allParams[field] === 'undefined' || allParams[field] === '') {
            			throw 'Required param is not set: ' + field + '.';
            		}
            	});
            }
            
            // XFUSION Redfish request wrapper
            function XFUSION(service, action, params) {
            	// Zabbix log prefix for distinguishing module and action in logs
            	this.zabbixLogPrefix = '[ XFUSION ] [ ' + service + ' ] [ ' + action + ' ]';
            	this.request = new HttpRequest();
            
            	// Execute a GET request to the specified Redfish API path
            	this.executeRequest = function (apiPath) {
            		// Use Basic Auth for authentication
            		this.request.addHeader('Authorization: Basic ' + btoa(params['user'] + ':' + params['password']));
            
            		// If a proxy is configured, access the target through the proxy
            		if (params['http_proxy']) {
            			this.request.setProxy(params['http_proxy']);
            			Zabbix.log(4, this.zabbixLogPrefix + ' Using http proxy: ' + params['http_proxy']);
            		}
            
            		// Build the final request URL
            		var finalUrl = params['url'] + apiPath;
            		Zabbix.log(4, this.zabbixLogPrefix + ' Request URL: ' + finalUrl);
            
            		// Send the HTTP GET request
            		var response = this.request.get(finalUrl);
            
            		// Clear request headers to avoid affecting subsequent requests
            		this.request.clearHeader();
            
            		// Validate whether the returned HTTP status code matches the expected value
            		if (this.request.getStatus() === parseInt(params['http_status_code'])) {
            			return response;
            		} else {
            			Zabbix.log(3, this.zabbixLogPrefix + ' Unexpected HTTP response code: ' + this.request.getStatus());
            			throw 'Unexpected HTTP response code: ' + this.request.getStatus();
            		}
            	};
            }
            
            // Parse parameters from the value passed by Zabbix
            var params = JSON.parse(value);
            
            // Validate required parameters: endpoint URL, username, password, and expected HTTP status code
            validateZabbixParams(['url', 'user', 'password', 'http_status_code'], params);
            
            // Create an XFUSION Fan query object
            var fanApi = new XFUSION('Fan', 'Get fan raw data', params);
            
            // Request the server thermal resource to get the list of all fan members
            var thermalRaw = JSON.parse(
            	fanApi.executeRequest('/redfish/v1/Chassis/1/Thermal')
            );
            
            // Validate that the Fans field exists and is an array
            if (!thermalRaw.Fans || !Array.isArray(thermalRaw.Fans)) {
            	throw 'Fan Members is missing or invalid.';
            }
            
            // Used to store detailed information for each fan
            var fanDetails = [];
            
            // Iterate through each fan member
            for (var i = 0; i < thermalRaw.Fans.length; i++) {
            	var fanMember = thermalRaw.Fans[i];
            
            	// Get the fan name and remove the "_Speed" or "_speed" suffix if present
            	var fanName = typeof fanMember.Name === 'string'
            		? fanMember.Name.replace(/_Speed/i, '')
            		: null;
            
            	// Extract required fan fields and build a simplified fan object
            	var fanInfo = {
            		Name: fanName,
            		SpeedRatio: fanMember.Oem && fanMember.Oem.xFusion ? fanMember.Oem.xFusion.SpeedRatio : null,
            		Status: fanMember.Status ? fanMember.Status.Health : null,
            		Model: fanMember.Model,
            		Speed: fanMember.Reading
            	};
            
            	// Add the retrieved fan details to the result array
            	fanDetails.push(fanInfo);
            }
            
            // Extract the overall fan status
            var fanEntireStatus = null;
            if (
            	thermalRaw.Oem &&
            	thermalRaw.Oem.xFusion &&
            	thermalRaw.Oem.xFusion.FanSummary
            ) {
            	fanEntireStatus = thermalRaw.Oem.xFusion.FanSummary.Status || null;
            }
            
            // Build the final return result
            var result = {
            	Fans: fanDetails,
            	FanEntireStatus: fanEntireStatus
            };
            
            // Convert the result to a JSON string and return it to Zabbix
            return JSON.stringify(result);
          description: 'Get thermal information.'
          parameters:
            - name: http_status_code
              value: '{$XFUSION.HTTP.RETURN.CODE.OK}'
            - name: password
              value: '{$XFUSION.HTTP.API.PASSWORD}'
            - name: url
              value: '{$XFUSION.HTTP.API.URL}'
            - name: user
              value: '{$XFUSION.HTTP.API.USER}'
