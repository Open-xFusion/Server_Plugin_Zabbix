        - uuid: 69771652ac764a309e80054bdcc32c37
          name: 'Get Alarm Raw'
          type: SCRIPT
          key: xfusion.server.system.getAlarmRaw
          delay: 60s
          history: 7d
          value_type: TEXT
          params: |
            // Validate required input parameters.
            function validateZabbixParams(requiredParams, allParams) {
            	requiredParams.forEach(function (field) {
            		if (typeof allParams !== 'object' || typeof allParams[field] === 'undefined' || allParams[field] === '') {
            			throw 'Required param is not set: ' + field + '.';
            		}
            	});
            }
            
            // Redfish helper object for sending requests and extracting data.
            function Redfish(service, action, params) {
            	this.zabbixLogPrefix = '[ REDFISH ] [ ' + service + ' ] [ ' + action + ' ]';
            	this.request = new HttpRequest();
            
            	// Execute GET request to Redfish API with Basic Authentication.
            	this.executeRequest = function (apiPath) {
            		this.request.addHeader('Authorization: Basic ' + btoa(params['user'] + ':' + params['password']));
            
            		const response = this.request.get(params['url'] + apiPath);
            
            		this.request.clearHeader();
            
            		if (this.request.getStatus() === parseInt(params['http_status_code'])) {
            			return response;
            		} else {
            			Zabbix.log(3, this.zabbixLogPrefix + ' Unexpected HTTP response code: ' + this.request.getStatus());
            			throw 'Unexpected HTTP response code: ' + this.request.getStatus();
            		}
            	};
            
            	// Extract data from JSON response by given key definitions.
            	this.extractData = function (data, keys, skipParse) {
            		if (!skipParse) {
            			try {
            				data = JSON.parse(data);
            			} catch (error) {
            				Zabbix.log(3, this.zabbixLogPrefix + ' Could not parse the received JSON object: ' + data);
            				throw 'Could not parse received JSON object. See logs for more information.';
            			}
            		}
            
            		if (Array.isArray(keys)) {
            			var returnBuffer = {};
            
            			for (var keyIdx = 0, keysLength = keys.length; keyIdx < keysLength; keyIdx++) {
            				if (keys[keyIdx]['path'] === '@odata.id') {
            					returnBuffer[keys[keyIdx]['name']] = data[keys[keyIdx]['path']];
            				} else {
            					returnBuffer[keys[keyIdx]['name']] = this.parseJSON(data, keys[keyIdx]['path'].split('.'));
            				}
            			}
            
            			return returnBuffer;
            		} else if (typeof keys === 'object') {
            			return { [keys['name']]: this.parseJSON(data, keys['path'].split('.')) };
            		} else if (typeof keys === 'string') {
            			return this.parseJSON(data, keys.split('.'));
            		} else {
            			throw 'Unexpected key type';
            		}
            	};
            
            	// Parse nested JSON object by path array.
            	this.parseJSON = function (data, jsonPath) {
            		for (var i = 0, args = jsonPath.length; i < args; i++) {
            			if (typeof data === 'undefined' || data === null) {
            				return undefined;
            			}
            			data = data[jsonPath[i]];
            		}
            		return data;
            	};
            
            	// Extract host part from base URL.
            	this.getHost = function () {
            		var match = params['url'].match(/^https?:\/\/([^\/:]+)/i);
            		return match ? match[1] : params['url'];
            	};
            }
            
            // Sanitize string for safe usage in Zabbix item key / discovery macro value.
            function sanitizeForKey(value) {
            	if (typeof value === 'undefined' || value === null) {
            		return 'UNKNOWN';
            	}
            
            	value = String(value);
            
            	// Replace whitespace with underscore.
            	value = value.replace(/\s+/g, '_');
            
            	// Replace characters that may break Zabbix item key parsing.
            	value = value.replace(/[^A-Za-z0-9._-]/g, '_');
            
            	// Collapse multiple underscores.
            	value = value.replace(/_+/g, '_');
            
            	// Trim leading/trailing underscores.
            	value = value.replace(/^_+|_+$/g, '');
            
            	if (value === '') {
            		return 'UNKNOWN';
            	}
            
            	return value;
            }
            
            const params = JSON.parse(value);
            
            // Validate mandatory parameters before execution.
            validateZabbixParams(['url', 'user', 'password', 'http_status_code'], params);
            
            var redfish = new Redfish('LogService', 'GetEntries', params);
            
            // Get all available log services under the target system.
            const logServices = redfish.extractData(
            	redfish.executeRequest('/redfish/v1/Systems/1/LogServices'),
            	'Members'
            );
            
            if (!Array.isArray(logServices)) {
            	throw 'Unexpected type for logServices.';
            }
            
            // Define log entry fields to be returned.
            const detailKeys = [
            	{
            		'name': 'Id',
            		'path': 'Id'
            	},
            	{
            		'name': 'EventId',
            		'path': 'EventId'
            	},
            	{
            		'name': 'EventTimestamp',
            		'path': 'EventTimestamp'
            	},
            	{
            		'name': 'Severity',
            		'path': 'Severity'
            	},
            	{
            		'name': 'Message',
            		'path': 'Message'
            	}
            ];
            
            // Return plain array as requested.
            var buffer = [];
            
            // Iterate through each log service.
            logServices.forEach(function (logServiceRef) {
            	if (!logServiceRef['@odata.id']) {
            		return;
            	}
            
            	// Get log service details and find its entries collection path.
            	const logServiceData = JSON.parse(redfish.executeRequest(logServiceRef['@odata.id']));
            	const entriesPath = redfish.parseJSON(logServiceData, ['Entries', '@odata.id']);
            
            	if (!entriesPath) {
            		return;
            	}
            
            	// Get all log entry references from the entries collection.
            	const entries = redfish.extractData(
            		redfish.executeRequest(entriesPath),
            		'Members'
            	);
            
            	if (!Array.isArray(entries)) {
            		return;
            	}
            
            	// Iterate through each log entry and collect required fields.
            	entries.forEach(function (entryRef) {
            		if (!entryRef['@odata.id']) {
            			return;
            		}
            
            		var logDetail = redfish.extractData(
            			redfish.executeRequest(entryRef['@odata.id']),
            			detailKeys
            		);
            
            		// EventId is mandatory for unique event identification.
            		// If EventId is missing, skip this record.
            		if (!logDetail['EventId']) {
            			return;
            		}
            
            		var eventId = logDetail['EventId'];
            		var eventTimestamp = logDetail['EventTimestamp'] || 'UNKNOWN';
            		var message = logDetail['Message'] || 'UNKNOWN';
            
            		// EVENTKEY = EventTimestamp + "_" + EventId + "_" + sanitize(Message)
            		var eventKey = sanitizeForKey(eventTimestamp) + '_' +
            			sanitizeForKey(eventId) + '_' +
            			sanitizeForKey(message);
            
            		// Map severity to monitoring state.
            		var state = (logDetail['Severity'] === 'Critical' || logDetail['Severity'] === 'Warning') ? 'Problem' : 'OK';
            
            		buffer.push({
            			'EventKey': eventKey,
            			'Id': String(logDetail['Id'] || ''),
            			'EventId': String(eventId),
            			'EventTimestamp': String(eventTimestamp),
            			'Severity': String(logDetail['Severity'] || ''),
            			'Message': String(message),
            			'State': String(state),
            			'Host': String(redfish.getHost())
            		});
            	});
            });
            
            // Return plain JSON array.
            return JSON.stringify(buffer);
          description: 'Get Alarm information.'
          parameters:
            - name: http_status_code
              value: '{$XFUSION.HTTP.RETURN.CODE.OK}'
            - name: password
              value: '{$XFUSION.HTTP.API.PASSWORD}'
            - name: url
              value: '{$XFUSION.HTTP.API.URL}'
            - name: user
              value: '{$XFUSION.HTTP.API.USER}'
